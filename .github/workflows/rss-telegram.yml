name: RSS to Telegram

on:
  schedule:
    # Every 6 hours -- just re-launches the loop below in case a previous
    # job ended (hit its runtime cap, was cancelled, etc). Most of the
    # actual polling happens inside the Python loop, not via this cron,
    # so occasional cron delays/skips don't matter much anymore.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the job can commit the updated state.json

concurrency:
  group: rss-to-telegram
  cancel-in-progress: false   # never kill an in-progress loop; just queue behind it

jobs:
  run:
    runs-on: ubuntu-latest
    # Hard safety net slightly above the script's own ~5h50m internal limit.
    timeout-minutes: 355

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # required so the script can `git push` mid-run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS -> Telegram loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rss_to_telegram.py

      - name: Final safety-net commit of state.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain state.json)" ]; then
            git add state.json
            git commit -m "chore: final state save [skip ci]"
            git push
          else
            echo "No changes to state.json"
          fi
